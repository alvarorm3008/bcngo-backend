name: Django CI with Docker Compose

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "backend/**"
      - ".github/workflows/ci-django.yml"
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "backend/**"
      - ".github/workflows/ci-django.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Verify Docker and Docker Compose installation
        run: |
          docker --version
          docker compose version

      - name: Build and start services
        run: docker compose up --build -d

      - name: Wait for PostgreSQL
        run: |
          until docker exec postgres-container pg_isready -U dbmasteruser -d postgres; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 3
          done

      - name: Run Pylint
        run: docker exec bcngo-container pylint /app --exit-zero

      - name: Run Django migrations
        run: docker exec bcngo-container python manage.py migrate

      - name: Run Django tests
        run: docker exec bcngo-container python manage.py test --noinput

      - name: Stop and clean up
        if: always()
        run: docker compose down

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@35.180.108.104 << 'EOF'
          cd /home/ubuntu/PES/bcngo-backend/backend
          git pull origin develop
          docker compose down
          docker compose up --build -d
          EOF
