version: '3.9'

services:
  app:
    build: . 
    ports:
      - 8000:8000
    container_name: bcngo-container
    image: bcngo-image
    restart: always
    depends_on:
      - db
    volumes:
      - .:/app

  db: 
    image: postgres
    container_name: postgres-container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dbmasteruser
      POSTGRES_PASSWORD: '!4xAaDg=b8qCpR?OzoH(~%sd,aa,K9xx'
      POSTGRES_DB: postgres
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
