googleid = "<latest version>"
coreKtx = "1.13.1"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
kotlinxDatetime = "0.4.0"
lifecycleRuntimeKtx = "2.8.6"
activityCompose = "1.9.2"
compose-bom = "2024.09.03"
compose-material3 = "1.1.0-beta01"

kotlin = "2.0.10"
kotlin-serialization-json = "1.6.3"
coroutines = "1.7.3"
